services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: itm_user
      POSTGRES_PASSWORD: itm_password
      POSTGRES_DB: itm_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itm_user -d itm_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local dev only. The Render free-tier deploy omits Redis entirely — see
  # docs/DEPLOYMENT.md / docs/ARCHITECTURE_DECISIONS.md ADR-047 — and the
  # backend falls back automatically to an in-process equivalent when
  # REDIS_URL is unset (app.core.rate_limit, app.auth.lockout).
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql://itm_user:itm_password@postgres:5432/itm_dev
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

volumes:
  postgres_data:
