name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: itm_user
          POSTGRES_PASSWORD: itm_password
          POSTGRES_DB: itm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itm_user -d itm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://itm_user:itm_password@localhost:5432/itm_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Apply migrations
        run: alembic upgrade head

      - name: Test (pytest)
        run: pytest --maxfail=1

  frontend-lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # frontend/src/config/env.ts fails fast (by design, see
      # docs/SECURITY_LOG.md) when NODE_ENV=production (set by `next build`)
      # and NEXT_PUBLIC_API_BASE_URL is unset — a deliberate deployment-safety
      # guard against silently shipping pointed at localhost. CI's Build step
      # never actually calls this URL (a static/prerender build only), so any
      # syntactically valid URL satisfies it; using the same placeholder
      # frontend/.env.example documents for local development.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npx eslint .

      - name: Typecheck (tsc)
        run: npx tsc --noEmit

      # No backend service runs in this job — the live-schema branch of
      # api-contract-drift.test.ts skips gracefully (ADR-030's documented
      # tradeoff: this drift check is a local/manual safety net, not yet a
      # CI-enforced one, since that would require provisioning a live
      # backend service here too, KI-041).
      - name: Test (vitest)
        run: npx vitest run

      - name: Build
        run: npm run build

  backend-docker-build:
    runs-on: ubuntu-latest
    # Verifies the exact artifact Render deploys (backend/Dockerfile) still
    # builds and actually serves traffic on Render's $PORT-binding contract
    # — neither was ever checked anywhere before (KI-001: "a real `docker
    # compose up --build` pass is still owed"; this doesn't close KI-001 in
    # full, since it builds/runs the image directly rather than through
    # docker-compose, but it is real CI-parity coverage for the specific
    # artifact production actually ships, which previously had none at all).
    #
    # ADR-048: the image's CMD (backend/scripts/start.sh) now runs
    # `alembic upgrade head` unconditionally, every boot, before uvicorn
    # ever starts — so this job needs a genuinely reachable Postgres, not
    # just a syntactically-valid placeholder DATABASE_URL. A plain
    # `docker run` container (not a job-level `services:` entry) is used so
    # it can share a private Docker network with the smoke-test container by
    # name, mirroring exactly how this was verified locally.
    steps:
      - uses: actions/checkout@v4

      - name: Build the production image
        run: docker build --file backend/Dockerfile --tag itm-backend-ci backend

      - name: Start a throwaway Postgres for the smoke test
        run: |
          docker network create itm-ci-net
          docker run -d --name itm-ci-pg --network itm-ci-net \
            -e POSTGRES_USER=ci_user -e POSTGRES_PASSWORD=ci_password -e POSTGRES_DB=ci_smoke \
            postgres:16-alpine
          for attempt in $(seq 1 30); do
            if docker exec itm-ci-pg pg_isready -U ci_user -d ci_smoke >/dev/null 2>&1; then
              echo "Postgres ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Postgres never became ready"
          docker logs itm-ci-pg
          exit 1

      - name: Migrate, then pre-seed one asset row (skip live catalog ingestion in CI)
        run: |
          # This job verifies "does the image boot, migrate, and bind to
          # $PORT" — not "does live catalog ingestion against the real
          # internet succeed," which is slow and depends on Yahoo's
          # availability (docs/KNOWN_ISSUES.md KI-044). This project has
          # never let CI depend on a live third-party market-data API, for
          # exactly that flakiness reason (yfinance/CoinGecko-backed tests
          # have never run in CI either). Applying migrations directly here
          # (the image's own `alembic`, bypassing start.sh via --entrypoint)
          # and inserting one throwaway asset row through the real ORM model
          # (not hand-written SQL that could silently drift from the
          # schema) makes app.ingestion.catalog_status's real "is assets
          # empty?" check see a non-empty table — so the smoke-test
          # container below takes its normal, real "already seeded, skip
          # ingestion" boot path, exactly like every actual Render redeploy
          # after the very first one.
          docker run --rm --network itm-ci-net \
            -e DATABASE_URL="postgresql://ci_user:ci_password@itm-ci-pg:5432/ci_smoke" \
            --entrypoint alembic \
            itm-backend-ci upgrade head

          docker run --rm --network itm-ci-net \
            -e DATABASE_URL="postgresql://ci_user:ci_password@itm-ci-pg:5432/ci_smoke" \
            --entrypoint python \
            itm-backend-ci -c "
          from app.core.database import session_scope
          from app.models import Asset
          from app.models.enums import AssetType
          with session_scope() as session:
              session.add(Asset(symbol='CISMOKE', name='CI Smoke Test Asset', asset_type=AssetType.STOCK, data_source='ci'))
          print('Pre-seeded one asset row.')
          "

      - name: Run it on a Render-shaped $PORT and smoke-test /healthz
        run: |
          docker run -d --name itm-backend-ci --network itm-ci-net \
            -p 10000:10000 \
            -e PORT=10000 \
            -e ENVIRONMENT=test \
            -e DATABASE_URL="postgresql://ci_user:ci_password@itm-ci-pg:5432/ci_smoke" \
            -e CORS_ALLOWED_ORIGINS="https://ci-placeholder.vercel.app" \
            -e JWT_SECRET="ci-only-not-a-real-secret-$(date +%s)" \
            itm-backend-ci

          for attempt in $(seq 1 30); do
            if curl -sf http://localhost:10000/healthz; then
              echo "healthz OK"
              exit 0
            fi
            sleep 1
          done

          echo "::error::/healthz never returned 200 — dumping container logs"
          docker logs itm-backend-ci
          exit 1

      - name: Assert ingestion was actually skipped (the fast, common boot path)
        run: docker logs itm-backend-ci 2>&1 | grep -F "Asset catalog already present — skipping ingestion."

      - name: Container logs (always, for debugging)
        if: always()
        run: docker logs itm-backend-ci || true

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks/gitleaks-action@v2 was replaced with a direct CLI invocation:
      # the action infers a commit range from the GitHub event (push/PR refs),
      # which becomes ambiguous after a merge or an unrelated-history pull and
      # can fail the job even when no leak exists ("no leaks found" followed by
      # a non-zero exit). Running `gitleaks detect` directly against the
      # checked-out path scans the repository's full git history unconditionally
      # instead of diffing two refs, so it has no commit range to resolve and
      # cannot hit this failure mode. Pinned to the same version used in
      # .pre-commit-config.yaml so local and CI scans match.
      - name: Install gitleaks
        run: |
          curl -sSL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks
          rm -f gitleaks.tar.gz gitleaks

      - name: Scan repository for secrets (gitleaks, full history)
        run: gitleaks detect --source . --redact --verbose
