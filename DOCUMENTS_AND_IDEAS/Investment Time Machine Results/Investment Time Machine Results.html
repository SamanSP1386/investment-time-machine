  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ly=\"IBM Plex Mono, monospace\" font-size=\"12\" fill=\"oklch(0.45 0.02 50)\">Dec 2024<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fsection>\n\n    <section style=\"padding:112px 0 40px; display:grid; grid-template-columns:repeat(3,1fr); gap:56px; animation: sectionRise 0.9s ease both; animation-delay: 0.9s;\">\n      <div style=\"grid-column:1 / -1; font-family:'Newsreader',serif; font-style:italic; font-size:26px; color:oklch(0.2 0.015 50); margin-bottom:8px;\">Why?<\u002Fdiv>\n      <sc-for list=\"{{ whyItems }}\" as=\"item\" hint-placeholder-count=\"3\">\n        <div>\n          <div style=\"font-family:'Public Sans',sans-serif; font-weight:600; font-size:15px; color:oklch(0.4 0.12 30); margin-bottom:12px;\">{{ item.heading }}<\u002Fdiv>\n          <div style=\"font-family:'Public Sans',sans-serif; font-size:15.5px; line-height:1.65; color:oklch(0.32 0.015 50);\">{{ item.body }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fsection>\n\n    <section style=\"padding:112px 0 60px; animation: sectionRise 0.9s ease both; animation-delay: 1.05s;\">\n      <details class=\"itm-proof\" style=\"border-top:1px solid oklch(0 0 0 / 0.1); padding-top:28px;\">\n        <summary style=\"cursor:pointer; list-style:none; font-family:'Public Sans',sans-serif; font-weight:600; font-size:16px; color:oklch(0.2 0.015 50); display:flex; align-items:center; gap:10px;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:oklch(0.4 0.12 30);\">＋<\u002Fspan>\n          The Proof — methodology &amp; data\n        <\u002Fsummary>\n        <div style=\"padding:28px 0 0 0; max-width:760px;\">\n          <p style=\"font-family:'Public Sans',sans-serif; font-size:14.5px; line-height:1.7; color:oklch(0.42 0.02 50); margin:0 0 28px;\">\n            Calculated on split-adjusted closing prices with all cash dividends reinvested on their ex-date. Total return reflects price appreciation plus reinvested distributions; CAGR annualizes the total return over the 4.55-year holding period. Figures are illustrative and do not account for taxes or brokerage fees.\n          <\u002Fp>\n          <div style=\"display:table; width:100%; border-collapse:collapse; font-family:'IBM Plex Mono',monospace; font-size:13px;\">\n            <div style=\"display:table-row\">\n              <div style=\"display:table-cell; text-align:left; padding:10px 12px; color:oklch(0.45 0.02 50); font-weight:500; text-transform:uppercase; letter-spacing:0.06em; font-size:11px; border-bottom:1px solid oklch(0 0 0 / 0.14);\">Date<\u002Fdiv>\n              <div style=\"display:table-cell; text-align:left; padding:10px 12px; color:oklch(0.45 0.02 50); font-weight:500; text-transform:uppercase; letter-spacing:0.06em; font-size:11px; border-bottom:1px solid oklch(0 0 0 / 0.14);\">Event<\u002Fdiv>\n              <div style=\"display:table-cell; text-align:left; padding:10px 12px; color:oklch(0.45 0.02 50); font-weight:500; text-transform:uppercase; letter-spacing:0.06em; font-size:11px; border-bottom:1px solid oklch(0 0 0 / 0.14);\">Price / Div<\u002Fdiv>\n              <div style=\"display:table-cell; text-align:left; padding:10px 12px; color:oklch(0.45 0.02 50); font-weight:500; text-transform:uppercase; letter-spacing:0.06em; font-size:11px; border-bottom:1px solid oklch(0 0 0 / 0.14);\">Shares Held<\u002Fdiv>\n              <div style=\"display:table-cell; text-align:left; padding:10px 12px; color:oklch(0.45 0.02 50); font-weight:500; text-transform:uppercase; letter-spacing:0.06em; font-size:11px; border-bottom:1px solid oklch(0 0 0 / 0.14);\">Value<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ proofRows }}\" as=\"row\" hint-placeholder-count=\"6\">\n              <div style=\"display:table-row\">\n                <div style=\"display:table-cell; padding:10px 12px; border-bottom:1px solid oklch(0 0 0 / 0.07); color:oklch(0.3 0.015 50);\">{{ row.date }}<\u002Fdiv>\n                <div style=\"display:table-cell; padding:10px 12px; border-bottom:1px solid oklch(0 0 0 / 0.07); color:oklch(0.3 0.015 50);\">{{ row.event }}<\u002Fdiv>\n                <div style=\"display:table-cell; padding:10px 12px; border-bottom:1px solid oklch(0 0 0 / 0.07); color:oklch(0.3 0.015 50);\">{{ row.price }}<\u002Fdiv>\n                <div style=\"display:table-cell; padding:10px 12px; border-bottom:1px solid oklch(0 0 0 / 0.07); color:oklch(0.3 0.015 50);\">{{ row.shares }}<\u002Fdiv>\n                <div style=\"display:table-cell; padding:10px 12px; border-bottom:1px solid oklch(0 0 0 / 0.07); color:oklch(0.4 0.12 30); font-weight:600;\">{{ row.value }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fsection>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 1400}, &quot;theme&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;dark&quot;, &quot;light&quot;], &quot;default&quot;: &quot;dark&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    heroInvested: \"$0,000.00\",\n    heroFinalFig: \"$0,000.00\",\n    statFinalVal: \"$0,000.00\",\n    statReturnVal: \"+00.00%\",\n    statCagrVal: \"+00.00%\",\n    heroInvestedGlow: false,\n    heroFinalGlow: false,\n    statFinalGlow: false,\n    statReturnGlow: false,\n    statCagrGlow: false,\n  };\n\n  scramble(target, key, duration, glowKey) {\n    const start = performance.now();\n    const len = target.length;\n    const ease = (t) => 1 - Math.pow(1 - t, 3);\n    const step = (now) => {\n      const raw = Math.min(1, (now - start) / duration);\n      const p = ease(raw);\n      const locked = Math.floor(p * len);\n      let out = \"\";\n      for (let i = 0; i < len; i++) {\n        const ch = target[i];\n        out += (i < locked || !/[0-9]/.test(ch)) ? ch : String(Math.floor(Math.random() * 10));\n      }\n      this.setState({ [key]: out });\n      if (raw < 1) {\n        requestAnimationFrame(step);\n      } else if (glowKey) {\n        this.setState({ [glowKey]: true });\n        setTimeout(() => this.setState({ [glowKey]: false }), 650);\n      }\n    };\n    requestAnimationFrame(step);\n  }\n\n  componentDidMount() {\n    // Sections reveal via pure CSS (sectionRise keyframe) so they can never get stuck invisible.\n    // Scramble the dollar figures on a fixed stagger shortly after load.\n    setTimeout(() => this.scramble(\"$1,000.00\", \"heroInvested\", 1100, \"heroInvestedGlow\"), 150);\n    setTimeout(() => this.scramble(\"$1,744.51\", \"heroFinalFig\", 1250, \"heroFinalGlow\"), 300);\n    setTimeout(() => this.scramble(\"$1,744.51\", \"statFinalVal\", 950, \"statFinalGlow\"), 500);\n    setTimeout(() => this.scramble(\"+74.45%\", \"statReturnVal\", 950, \"statReturnGlow\"), 620);\n    setTimeout(() => this.scramble(\"+12.99%\", \"statCagrVal\", 950, \"statCagrGlow\"), 740);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const theme = this.props.theme ?? \"dark\";\n\n    const tideIntensity = 0.45;\n    const tideSpeed = 1;\n    const tideTeal = \"45,145,150\";\n    const tideBlue = \"58,90,140\";\n    const tideAccent = \"45,180,168\";\n\n    const tideBands = [\n      { top: 8,  height: 150, color: tideTeal, op: (0.14 * tideIntensity).toFixed(3), dur: 42, driftName: \"bandDriftA\" },\n      { top: 22, height: 170, color: tideBlue, op: (0.11 * tideIntensity).toFixed(3), dur: 55, driftName: \"bandDriftB\" },\n      { top: 38, height: 130, color: tideTeal, op: (0.13 * tideIntensity).toFixed(3), dur: 38, driftName: \"bandDriftA\" },\n      { top: 54, height: 175, color: tideBlue, op: (0.1 * tideIntensity).toFixed(3),  dur: 60, driftName: \"bandDriftB\" },\n      { top: 70, height: 145, color: tideTeal, op: (0.12 * tideIntensity).toFixed(3), dur: 48, driftName: \"bandDriftA\" },\n      { top: 84, height: 120, color: tideAccent, op: (0.1 * tideIntensity).toFixed(3), dur: 65, driftName: \"bandDriftB\" },\n    ];\n\n    const whales = [\n      { left: 12, top: 20, size: 900,  negHalf: -450, color: \"40,75,100\", op: (0.2 * tideIntensity).toFixed(3), dur: +(70 / tideSpeed).toFixed(1), driftName: \"whaleDrift1\", rippleDur: 9,  rippleDelay: 0 },\n      { left: 55, top: 60, size: 1100, negHalf: -550, color: \"35,60,90\",  op: (0.18 * tideIntensity).toFixed(3), dur: +(90 / tideSpeed).toFixed(1), driftName: \"whaleDrift2\", rippleDur: 11, rippleDelay: 3 },\n      { left: 78, top: 26, size: 820,  negHalf: -410, color: \"48,95,105\", op: (0.18 * tideIntensity).toFixed(3), dur: +(80 / tideSpeed).toFixed(1), driftName: \"whaleDrift3\", rippleDur: 10, rippleDelay: 6 },\n    ];\n\n    const speckSeed = [\n      { left: 8, top: 14 }, { left: 22, top: 33 }, { left: 35, top: 12 }, { left: 47, top: 48 },\n      { left: 61, top: 24 }, { left: 73, top: 40 }, { left: 85, top: 18 }, { left: 92, top: 55 },\n      { left: 15, top: 62 }, { left: 29, top: 75 }, { left: 44, top: 84 }, { left: 58, top: 68 },\n      { left: 70, top: 88 }, { left: 82, top: 72 }, { left: 6, top: 90 }, { left: 95, top: 30 },\n    ];\n    const specks = speckSeed.map((p, i) => ({\n      left: p.left, top: p.top,\n      width: 18 + (i % 5) * 4,\n      peak: (0.06 + (i % 4) * 0.02) * tideIntensity,\n      dur: 5 + (i % 5),\n      delay: +((i * 0.7) % 6).toFixed(1),\n    }));\n\n    return {\n      isDark: theme === \"dark\",\n      isLight: theme === \"light\",\n      tideOpacity: 1,\n      tideBands,\n      whales,\n      specks,\n\n      heroInvested: s.heroInvested,\n      heroFinalFig: s.heroFinalFig,\n      heroInvestedGlowPx: s.heroInvestedGlow ? 18 : 0,\n      heroFinalGlowPx: s.heroFinalGlow ? 22 : 0,\n      statFinalGlowPx: s.statFinalGlow ? 16 : 0,\n      statReturnGlowPx: s.statReturnGlow ? 16 : 0,\n      statCagrGlowPx: s.statCagrGlow ? 16 : 0,\n\n      statItems: [\n        { label: \"Final Value\", value: s.statFinalVal, glowPx: s.statFinalGlow ? 16 : 0 },\n        { label: \"Total Return\", value: s.statReturnVal, glowPx: s.statReturnGlow ? 16 : 0 },\n        { label: \"Annual Return (CAGR)\", value: s.statCagrVal, glowPx: s.statCagrGlow ? 16 : 0 },\n      ],\n\n      whyItems: [\n        { heading: \"Price appreciation\", body: \"Apple's share price nearly doubled over this stretch, propelled by expanding services revenue, a strong iPhone upgrade cycle, and sustained buyback-driven earnings growth.\" },\n        { heading: \"Dividend contribution\", body: \"Quarterly dividends, reinvested automatically, added a modest but compounding layer of return — roughly 3% of the total gain came from distributions rather than price alone.\" },\n        { heading: \"Inflation adjustment\", body: \"Adjusted for the period's cumulative inflation of about 19%, the real annualized return falls to roughly 9.7% — still comfortably ahead of cash or bonds.\" },\n      ],\n\n      proofRows: [\n        { date: \"2020-05-14\", event: \"Initial investment\", price: \"$1,000.00\", shares: \"12.82\", value: \"$1,000.00\" },\n        { date: \"2020-08-31\", event: \"4-for-1 stock split\", price: \"—\", shares: \"51.28\", value: \"$1,062.30\" },\n        { date: \"2021-02-05\", event: \"Dividend reinvested\", price: \"+$2.05\", shares: \"51.35\", value: \"$1,486.20\" },\n        { date: \"2022-06-01\", event: \"Market correction\", price: \"—\", shares: \"51.35\", value: \"$1,180.40\" },\n        { date: \"2023-12-15\", event: \"Dividend reinvested\", price: \"+$3.68\", shares: \"51.49\", value: \"$1,602.75\" },\n        { date: \"2024-12-03\", event: \"Final valuation\", price: \"—\", shares: \"51.49\", value: \"$1,744.51\" },\n      ],\n\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
