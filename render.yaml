# Render Blueprint — backend API + free Postgres (Redis deliberately
# omitted, ADR-047: the app runs correctly without it via
# app.core.rate_limit.InMemoryRateLimiter / app.auth.lockout.InMemoryAccountLockout).
#
# Usage: in the Render dashboard, "New +" -> "Blueprint", point it at this
# repository. Render reads this file and proposes the service + database
# below. Full step-by-step founder instructions: docs/DEPLOYMENT.md.
#
# Env vars marked `sync: false` are NOT filled in here on purpose — they are
# either secrets (never committed) or values only known once the sibling
# Vercel deploy exists (the frontend's own URL, needed for CORS). Fill them
# in via the Render dashboard after the blueprint is created; docs/DEPLOYMENT.md
# lists every one with its exact value/how to generate it.
#
# Schema note: Render's render.yaml field names have changed across product
# versions (e.g. `env: docker` vs. `runtime: docker`). If Render's blueprint
# parser rejects a field here, check Render's current render.yaml reference
# and adjust — this file was authored against Render's documented schema at
# the time of writing but was not validated against a live Render account
# (no network access in this environment).

databases:
  - name: itm-postgres
    plan: free
    databaseName: itm_prod
    user: itm_user

services:
  - type: web
    name: itm-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /healthz
    envVars:
      - key: APP_NAME
        value: Investment Time Machine
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: itm-postgres
          property: connectionString
      # The deployed Vercel origin(s), comma-separated (config.py's
      # cors_allowed_origins_list) — e.g.
      # "https://investment-time-machine.vercel.app". Set this AFTER the
      # Vercel project exists and its URL is known (docs/DEPLOYMENT.md step 6).
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # A long, random, unguessable value — generate with:
      #   python -c "import secrets; print(secrets.token_urlsafe(64))"
      # `generateValue: true` asks Render to generate and store one
      # automatically at blueprint-creation time; regenerate manually in the
      # dashboard if it is ever suspected to have leaked.
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      # Redis intentionally omitted — no REDIS_URL key here at all. Leaving
      # it unset (not set to an empty string) is what selects the
      # in-process rate-limiter/lockout fallback; see app/core/config.py
      # and docs/DEPLOYMENT.md's "Redis-optional" note.
      # Optional: FRED-sourced economic indicator ingestion. Leave blank to
      # skip; the starter asset catalog (seed_real_catalog) does not need it.
      - key: FRED_API_KEY
        sync: false
      # Optional: the Educational AI System. Leave AI_PROVIDER=none (the
      # default — no key required, NullProvider) unless a real Anthropic key
      # is being configured for this deployment.
      - key: AI_PROVIDER
        value: none
